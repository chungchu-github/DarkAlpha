name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  auto-execution:
    name: dark-alpha-auto-execution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dark-alpha-auto-execution
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src tests

      - name: Format check (ruff)
        run: poetry run ruff format --check src tests

      # mypy currently surfaces ~30 pre-existing errors in Codex-written modules
      # (reporting/*, gate6.py, live_user_stream.py, etc.). Tracked as a separate
      # cleanup PR — non-blocking until that lands so the rest of CI stays green.
      - name: Type check (mypy)
        continue-on-error: true
        run: poetry run mypy src

      - name: Tests with coverage
        run: poetry run pytest -q --cov=src --cov-report=term-missing --cov-fail-under=80

  signals:
    name: dark-alpha-signals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dark-alpha-signals
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Tests
        run: poetry run pytest -q
