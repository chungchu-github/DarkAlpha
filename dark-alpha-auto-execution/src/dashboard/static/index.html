<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Alpha Live Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --border: #334155;
    --muted: #272F42;
    --fg: #F8FAFC;
    --fg-dim: #94A3B8;
    --ok: #10B981;
    --warn: #F59E0B;
    --bad: #EF4444;
    --gold: #F59E0B;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.45; }
  code, .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  h1 { font-size: 16px; font-weight: 600; margin: 0; color: var(--gold); letter-spacing: .02em; }
  h2 { font-size: 13px; font-weight: 600; margin: 0 0 8px 0; color: var(--fg-dim); text-transform: uppercase; letter-spacing: .06em; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  header .meta { color: var(--fg-dim); font-size: 12px; }
  header .meta .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); margin-right: 6px; vertical-align: middle; }
  main { padding: 16px 20px; max-width: 1600px; margin: 0 auto; }

  /* KPI row */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; box-shadow: var(--shadow); }
  .kpi .label { font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .kpi .value { font-size: 18px; font-weight: 600; }
  .kpi .sub { font-size: 11px; color: var(--fg-dim); margin-top: 4px; }
  .kpi.ok { border-left: 3px solid var(--ok); }
  .kpi.warn { border-left: 3px solid var(--warn); }
  .kpi.bad { border-left: 3px solid var(--bad); }

  /* Panels grid */
  .panels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; box-shadow: var(--shadow); overflow: hidden; }
  .panel.full { grid-column: 1 / -1; }
  .panel .empty { color: var(--fg-dim); font-style: italic; padding: 12px 0; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-weight: 500; color: var(--fg-dim); border-bottom: 1px solid var(--border); padding: 6px 8px; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--muted); }
  tr:last-child td { border-bottom: none; }
  td.num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; text-align: right; }
  td.id { font-family: 'JetBrains Mono', ui-monospace, monospace; color: var(--fg-dim); font-size: 11px; }

  /* Status pills */
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; letter-spacing: .02em; }
  .pill.ok { background: rgba(16,185,129,.15); color: var(--ok); }
  .pill.warn { background: rgba(245,158,11,.15); color: var(--warn); }
  .pill.bad { background: rgba(239,68,68,.15); color: var(--bad); }
  .pill.dim { background: var(--muted); color: var(--fg-dim); }

  /* Gate 6 readiness markdown */
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; font-size: 11px; line-height: 1.5; margin: 0; color: var(--fg-dim); }

  /* Sparkline */
  .sparkline-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 16px; box-shadow: var(--shadow); }
  .sparkline-wrap svg { width: 100%; height: 80px; display: block; }
  .sparkline-wrap .meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--fg-dim); margin-top: 4px; }

  footer { text-align: center; padding: 24px 0 12px; color: var(--fg-dim); font-size: 11px; }
  .err { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1>Dark Alpha · Live Monitor</h1>
  <div class="meta"><span class="dot" id="poll-indicator"></span><span id="last-poll">—</span></div>
</header>

<main>
  <div class="kpi-row" data-panel="kpis"></div>

  <div class="panels">
    <div class="panel" data-panel="positions"><h2>Live Positions</h2><div class="content"></div></div>
    <div class="panel" data-panel="tickets"><h2>Recent Tickets (10)</h2><div class="content"></div></div>
    <div class="panel" data-panel="reconcile"><h2>Reconcile History (5)</h2><div class="content"></div></div>
    <div class="panel" data-panel="heartbeat"><h2>User-Stream Heartbeat</h2><div class="content"></div></div>
    <div class="panel" data-panel="breakers"><h2>Circuit Breakers</h2><div class="content"></div></div>
    <div class="panel" data-panel="halts"><h2>Recent Halts (24h)</h2><div class="content"></div></div>
    <div class="panel full" data-panel="gate6"><h2>Gate 6 Readiness</h2><div class="content"></div></div>
  </div>

  <div class="sparkline-wrap" data-panel="equity">
    <h2>Equity (last 100 snapshots)</h2>
    <svg viewBox="0 0 600 80" preserveAspectRatio="none"><path d="" fill="none" stroke="var(--gold)" stroke-width="1.5"/></svg>
    <div class="meta"><span class="from">—</span><span class="to">—</span></div>
  </div>

  <footer>Read-only. Localhost-only. Polling 5s (hot) / 30s (slow).</footer>
</main>

<script>
const HOT = 5000;
const SLOW = 30000;

function fmtNum(v, digits = 2) {
  if (v === null || v === undefined || Number.isNaN(v)) return '—';
  return Number(v).toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits });
}
function fmtAge(s) {
  if (s === null || s === undefined) return '—';
  s = Math.floor(s);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function fetchJson(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + ' ' + r.status);
  return await r.json();
}

// ----- Panel renderers -----

function renderKpis(d) {
  const ks = d.kill_switch;
  const ksClass = ks.active ? 'bad' : 'ok';
  const ksValue = ks.active ? '🔴 ACTIVE' : '🟢 clear';
  const armed = d.mainnet_armed ? 'bad' : 'ok';
  const pnl = d.today_pnl.net_pnl;
  const pnlClass = pnl === null ? '' : (pnl >= 0 ? 'ok' : 'bad');
  const pnlValue = pnl === null ? '—' : (pnl >= 0 ? '+' : '') + fmtNum(pnl, 2);
  const recon = d.last_reconcile;
  const reconClass = recon.status === 'ok' ? 'ok' : (recon.status === 'mismatch' || recon.status === 'failed') ? 'bad' : 'warn';
  return [
    `<div class="kpi ${ksClass}"><div class="label">Kill switch</div><div class="value">${ksValue}</div><div class="sub mono">${escapeHtml(ks.sentinel_path)}</div></div>`,
    `<div class="kpi ${armed}"><div class="label">Mode / Env</div><div class="value">${escapeHtml(d.mode)} / ${escapeHtml(d.environment)}</div><div class="sub">mainnet armed: ${d.mainnet_armed ? '🔴 yes' : '🟢 no'}</div></div>`,
    `<div class="kpi ${pnlClass}"><div class="label">Today PnL · ${escapeHtml(d.today_pnl.date)}</div><div class="value">${pnlValue}</div><div class="sub">trades=${d.today_pnl.trade_count} wins=${d.today_pnl.win_count}</div></div>`,
    `<div class="kpi ${d.open_live_positions > 0 ? 'warn' : 'ok'}"><div class="label">Open live positions</div><div class="value">${d.open_live_positions}</div><div class="sub">${d.open_live_positions > 0 ? 'monitor closely' : 'flat'}</div></div>`,
    `<div class="kpi ${reconClass}"><div class="label">Last reconcile</div><div class="value">${escapeHtml(recon.status || '—')}</div><div class="sub">${fmtAge(recon.age_seconds)} ago</div></div>`,
  ].join('');
}

function renderPositions(rows) {
  if (!rows.length) return '<div class="empty">No open live positions.</div>';
  const r = rows.map(p => `
    <tr>
      <td>${escapeHtml(p.symbol)}</td>
      <td><span class="pill ${p.direction === 'long' ? 'ok' : 'bad'}">${p.direction}</span></td>
      <td class="num">${fmtNum(p.filled_quantity, 4)}</td>
      <td class="num">${fmtNum(p.entry_price)}</td>
      <td class="num">${fmtNum(p.stop_price)}</td>
      <td class="num">${fmtNum(p.take_profit_price)}</td>
      <td>${fmtAge(p.age_seconds)}</td>
      <td class="id">${escapeHtml((p.ticket_id || '').slice(0, 10))}</td>
    </tr>`).join('');
  return `<table><thead><tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Stop</th><th>TP</th><th>Age</th><th>Ticket</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderTickets(rows) {
  if (!rows.length) return '<div class="empty">No tickets.</div>';
  const STATUS_CLASS = { closed: 'ok', filled: 'ok', accepted: 'ok', rejected: 'bad', cancelled: 'dim' };
  const r = rows.map(t => `
    <tr>
      <td class="id">${escapeHtml(t.ticket_id.slice(0, 10))}</td>
      <td><span class="pill ${STATUS_CLASS[t.status] || 'warn'}">${escapeHtml(t.status)}</span></td>
      <td>${t.shadow_mode ? '<span class="pill dim">shadow</span>' : '<span class="pill ok">live</span>'}</td>
      <td>${fmtAge(t.age_seconds)}</td>
      <td title="${escapeHtml(t.reject_reason || '')}">${escapeHtml((t.reject_reason || '').slice(0, 60))}</td>
    </tr>`).join('');
  return `<table><thead><tr><th>ID</th><th>Status</th><th>Mode</th><th>Age</th><th>Reject reason</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderReconcile(rows) {
  if (!rows.length) return '<div class="empty">No reconcile runs yet.</div>';
  const STATUS_CLASS = { ok: 'ok', mismatch: 'bad', failed: 'bad', started: 'warn' };
  const r = rows.map(rr => `
    <tr>
      <td class="id">${escapeHtml(rr.run_id.slice(0, 10))}</td>
      <td><span class="pill ${STATUS_CLASS[rr.status] || 'warn'}">${escapeHtml(rr.status)}</span></td>
      <td>${fmtAge(rr.age_seconds)}</td>
      <td title="${escapeHtml(rr.details || '')}">${rr.status === 'ok' ? '' : escapeHtml((rr.details || '').slice(0, 80))}</td>
    </tr>`).join('');
  return `<table><thead><tr><th>Run ID</th><th>Status</th><th>Age</th><th>Details</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderHeartbeat(d) {
  if (d.created_at === null) return '<div class="empty">No heartbeat recorded yet.</div>';
  const age = d.age_seconds;
  let cls = 'ok';
  if (age > 180) cls = 'bad';
  else if (age > 90) cls = 'warn';
  return `<div style="display:flex;align-items:baseline;gap:12px;"><span class="pill ${cls}">${fmtAge(age)}</span><span style="color:var(--fg-dim);font-size:12px;">${escapeHtml(d.status || '')}</span></div><div class="sub" style="color:var(--fg-dim);font-size:11px;margin-top:6px;">last: ${escapeHtml(d.created_at)}</div>`;
}

function renderBreakers(rows) {
  if (!rows.length) return '<div style="color:var(--ok);">All breakers clear.</div>';
  const r = rows.map(b => `
    <tr>
      <td>${escapeHtml(b.name)}</td>
      <td><span class="pill ${b.status === 'ok' ? 'ok' : 'bad'}">${escapeHtml(b.status)}</span></td>
      <td>${escapeHtml(b.action)}</td>
      <td title="${escapeHtml(b.reason)}">${escapeHtml((b.reason || '').slice(0, 60))}</td>
      <td>${escapeHtml(b.tripped_at || '')}</td>
    </tr>`).join('');
  return `<table><thead><tr><th>Name</th><th>Status</th><th>Action</th><th>Reason</th><th>Tripped</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderHalts(rows) {
  if (!rows.length) return '<div style="color:var(--ok);">No halts in the last 24h.</div>';
  const r = rows.map(h => `
    <tr>
      <td>${fmtAge(h.age_seconds)}</td>
      <td><span class="pill bad">${escapeHtml(h.event_type)}</span></td>
      <td title="${escapeHtml(h.reason || '')}">${escapeHtml((h.reason || '').slice(0, 80))}</td>
    </tr>`).join('');
  return `<table><thead><tr><th>Age</th><th>Event</th><th>Reason</th></tr></thead><tbody>${r}</tbody></table>`;
}

function renderGate6(d) {
  return `<pre>${escapeHtml(d.markdown)}</pre>`;
}

function renderEquity(rows) {
  const wrap = document.querySelector('[data-panel="equity"]');
  const path = wrap.querySelector('path');
  const fromEl = wrap.querySelector('.from');
  const toEl = wrap.querySelector('.to');
  if (!rows.length) {
    path.setAttribute('d', '');
    fromEl.textContent = '—';
    toEl.textContent = '—';
    return;
  }
  const vals = rows.map(r => r.equity_usd);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const w = 600, h = 80, pad = 4;
  const pts = rows.map((r, i) => {
    const x = pad + (i / (rows.length - 1 || 1)) * (w - 2 * pad);
    const y = h - pad - ((r.equity_usd - min) / range) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  path.setAttribute('d', 'M' + pts.join(' L'));
  fromEl.textContent = `${rows[0].ts} · $${fmtNum(rows[0].equity_usd)}`;
  toEl.textContent = `${rows[rows.length - 1].ts} · $${fmtNum(rows[rows.length - 1].equity_usd)}`;
}

// ----- Polling driver -----

const PANELS = {
  kpis:       { url: '/api/kpis',       cadence: HOT,  render: renderKpis,       target: '[data-panel="kpis"]' },
  positions:  { url: '/api/positions',  cadence: HOT,  render: renderPositions,  target: '[data-panel="positions"] .content' },
  heartbeat:  { url: '/api/heartbeat',  cadence: HOT,  render: renderHeartbeat,  target: '[data-panel="heartbeat"] .content' },
  tickets:    { url: '/api/tickets',    cadence: SLOW, render: renderTickets,    target: '[data-panel="tickets"] .content' },
  reconcile:  { url: '/api/reconcile',  cadence: SLOW, render: renderReconcile,  target: '[data-panel="reconcile"] .content' },
  breakers:   { url: '/api/breakers',   cadence: SLOW, render: renderBreakers,   target: '[data-panel="breakers"] .content' },
  halts:      { url: '/api/halts',      cadence: SLOW, render: renderHalts,      target: '[data-panel="halts"] .content' },
  gate6:      { url: '/api/gate6',      cadence: SLOW, render: renderGate6,      target: '[data-panel="gate6"] .content' },
  equity:     { url: '/api/equity',     cadence: SLOW, render: renderEquity,     target: null },
};

const lastPollEl = document.getElementById('last-poll');
const dotEl = document.getElementById('poll-indicator');

async function pollOne(name, cfg) {
  try {
    const data = await fetchJson(cfg.url);
    const html = cfg.render(data);
    if (cfg.target) {
      const el = document.querySelector(cfg.target);
      if (el) el.innerHTML = html;
    }
    return true;
  } catch (e) {
    if (cfg.target) {
      const el = document.querySelector(cfg.target);
      if (el) el.innerHTML = `<div class="err">error: ${escapeHtml(e.message)}</div>`;
    }
    return false;
  }
}

function pulse(ok) {
  dotEl.style.background = ok ? 'var(--ok)' : 'var(--bad)';
  lastPollEl.textContent = new Date().toLocaleTimeString();
}

async function pollAll(cadence) {
  const promises = Object.entries(PANELS)
    .filter(([_, cfg]) => cfg.cadence === cadence)
    .map(([name, cfg]) => pollOne(name, cfg));
  const results = await Promise.all(promises);
  pulse(results.every(Boolean));
}

// initial paint + recurring polls
pollAll(HOT);
pollAll(SLOW);
setInterval(() => pollAll(HOT),  HOT);
setInterval(() => pollAll(SLOW), SLOW);
</script>
</body>
</html>
